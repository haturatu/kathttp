name: Native Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format
      - name: Check native formatting
        run: >-
          find src include tests -type f ! -name ca_bundle.h \( -name '*.cc' -o -name '*.cpp' -o -name '*.c' -o -name '*.h' -o -name '*.hpp' \) -print0 |
          xargs -0 clang-format --dry-run --Werror

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install static analysis tools and headers
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          clang clang-tidy cppcheck cmake ninja-build
          libngtcp2-dev libnghttp3-dev libssl-dev
      - name: Generate native compilation database
        run: >-
          cmake -S . -B build-tidy -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DKATHTTP_ANALYSIS_ONLY=ON
          -DKATHTTP_BUILD_JNI=OFF
      - name: Run clang-tidy
        run: run-clang-tidy -p build-tidy -quiet
      - name: Run cppcheck
        run: >-
          cppcheck --project=build-tidy/compile_commands.json
          --enable=warning,style,performance,portability
          --inline-suppr --suppress=missingIncludeSystem
          --error-exitcode=1

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install CMake and Ninja
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build
      - name: Build and run core tests with ASan and UBSan
        run: >-
          cmake -S . -B build-sanitize -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DKATHTTP_ANALYSIS_ONLY=ON
          -DKATHTTP_SANITIZE=ON
          -DKATHTTP_BUILD_JNI=OFF &&
          cmake --build build-sanitize --parallel &&
          ctest --test-dir build-sanitize --output-on-failure
